apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    app.kubernetes.io/part-of: sub2api
---
apiVersion: v1
kind: Secret
metadata:
  name: sub2api-dev-secrets
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/part-of: sub2api
type: Opaque
stringData:
  CONTROL_DATABASE_PASSWORD: "sub2api-dev-control-postgres-password"
  CONTROL_REDIS_PASSWORD: "sub2api-dev-control-redis-password"
  NODE_US_DATABASE_PASSWORD: "sub2api-dev-node-us-postgres-password"
  NODE_US_REDIS_PASSWORD: "sub2api-dev-node-us-redis-password"
  NODE_SG_DATABASE_PASSWORD: "sub2api-dev-node-sg-postgres-password"
  NODE_SG_REDIS_PASSWORD: "sub2api-dev-node-sg-redis-password"
  NODE_JP_DATABASE_PASSWORD: "sub2api-dev-node-jp-postgres-password"
  NODE_JP_REDIS_PASSWORD: "sub2api-dev-node-jp-redis-password"
  JWT_SECRET: "sub2api-dev-jwt-secret-minimum-32-bytes"
  TOTP_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  ADMIN_PASSWORD: "sub2api-dev-admin-password"
  QUOTA_LEASE_CONTROL_KEY: "sub2api-dev-quota-lease-control-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sub2api-common-config
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/part-of: sub2api
data:
  DATA_DIR: "/app/data"
  AUTO_SETUP: "true"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  SERVER_MODE: "release"
  RUN_MODE: "standard"
  DATABASE_PORT: "5432"
  DATABASE_USER: "sub2api"
  DATABASE_DBNAME: "sub2api"
  DATABASE_SSLMODE: "disable"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_ENABLE_TLS: "false"
  ADMIN_EMAIL: "admin@sub2api.local"
  JWT_EXPIRE_HOUR: "24"
  SETUP_MIGRATION_TIMEOUT_SECONDS: "300"
  TZ: "Asia/Shanghai"
  GATEWAY_QUOTA_LEASE_DEMO_ENABLED: "true"
  GATEWAY_QUOTA_LEASE_DEMO_DEFAULT_GRANT_AMOUNT: "1"
  GATEWAY_QUOTA_LEASE_DEMO_LEASE_TTL_SECONDS: "600"
  GATEWAY_QUOTA_LEASE_DEMO_RECLAIM_GRACE_SECONDS: "3600"
  GATEWAY_QUOTA_LEASE_DEMO_PREFLIGHT_RESERVE_AMOUNT: "0.000001"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sub2api-control-config
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: sub2api
data:
  DEPLOYMENT_ROLE: "control"
  GATEWAY_QUOTA_LEASE_DEMO_NODE_ID: "control-plane-dev"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sub2api-node-config
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: gateway-node
    app.kubernetes.io/part-of: sub2api
data:
  DEPLOYMENT_ROLE: "node"
  GATEWAY_QUOTA_LEASE_DEMO_CONTROL_PLANE_BASE_URL: "http://sub2api-control.dev.svc.cluster.local:8080/api/v1/node-leases/demo"
---
apiVersion: v1
kind: Service
metadata:
  name: sub2api-control-postgres
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: sub2api
    sub2api.dev/storage: control
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: postgres
    sub2api.dev/storage: control
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sub2api-control-postgres
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: sub2api
    sub2api.dev/storage: control
spec:
  serviceName: sub2api-control-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sub2api
      app.kubernetes.io/component: postgres
      sub2api.dev/storage: control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sub2api
        app.kubernetes.io/component: postgres
        app.kubernetes.io/part-of: sub2api
        sub2api.dev/storage: control
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "sub2api"
            - name: POSTGRES_DB
              value: "sub2api"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sub2api-dev-secrets
                  key: CONTROL_DATABASE_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: TZ
              value: "Asia/Shanghai"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U sub2api -d sub2api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U sub2api -d sub2api
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sub2api-control-redis
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sub2api
    sub2api.dev/storage: control
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: redis
    sub2api.dev/storage: control
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sub2api-control-redis
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sub2api
    sub2api.dev/storage: control
spec:
  serviceName: sub2api-control-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sub2api
      app.kubernetes.io/component: redis
      sub2api.dev/storage: control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sub2api
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: sub2api
        sub2api.dev/storage: control
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - exec redis-server --save 60 1 --appendonly yes --appendfsync everysec --requirepass "$REDIS_PASSWORD"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sub2api-dev-secrets
                  key: CONTROL_REDIS_PASSWORD
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: sub2api-dev-secrets
                  key: CONTROL_REDIS_PASSWORD
            - name: TZ
              value: "Asia/Shanghai"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
