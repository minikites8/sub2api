apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sub2api-dev
  namespace: dev
  labels:
    app.kubernetes.io/name: sub2api
    app.kubernetes.io/part-of: sub2api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: sub2api-control.dev.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sub2api-control
                port:
                  name: http
    - host: sub2api-api.dev.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sub2api-node
                port:
                  name: http
