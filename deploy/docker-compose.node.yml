# =============================================================================
# Sub2API Docker Compose - Gateway Node
# =============================================================================
# 用于部署一台海外调用节点。控制面先生成节点注册链接，把完整 URL 填入
# GATEWAY_QUOTA_LEASE_REGISTRATION_URL 后启动本 compose。
#
# Usage:
#   cp deploy/.env.node.example deploy/.env.node
#   docker compose --env-file deploy/.env.node -f deploy/docker-compose.node.yml up -d
#   docker compose --env-file deploy/.env.node -f deploy/docker-compose.node.yml logs -f sub2api-node
# =============================================================================

services:
  sub2api-node:
    image: ${SUB2API_IMAGE:-ghcr.io/minikites8/sub2api:test-codex-quota-lease-demo}
    container_name: ${SUB2API_NODE_CONTAINER_NAME:-sub2api-node}
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./node_data:/app/data:Z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATA_DIR=/app/data
      - AUTO_SETUP=true
      - DEPLOYMENT_ROLE=node

      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - ENABLE_SERVER_TIMING=${ENABLE_SERVER_TIMING:-false}
      - RUN_MODE=${RUN_MODE:-standard}
      - TZ=${TZ:-Asia/Shanghai}

      - DATABASE_HOST=postgres-node
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}

      - REDIS_HOST=redis-node
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-10}
      - REDIS_ENABLE_TLS=false

      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}

      - GATEWAY_QUOTA_LEASE_ENABLED=true
      - GATEWAY_QUOTA_LEASE_NODE_ID=${GATEWAY_QUOTA_LEASE_NODE_ID:-sub2api-node-1}
      - SUB2API_NODE_POOL=${SUB2API_NODE_POOL:-foreign}
      - GATEWAY_QUOTA_LEASE_REGISTRATION_URL=${GATEWAY_QUOTA_LEASE_REGISTRATION_URL:?GATEWAY_QUOTA_LEASE_REGISTRATION_URL is required}
      - GATEWAY_QUOTA_LEASE_DEFAULT_GRANT_AMOUNT=${GATEWAY_QUOTA_LEASE_DEFAULT_GRANT_AMOUNT:-1}
      - GATEWAY_QUOTA_LEASE_LEASE_TTL_SECONDS=${GATEWAY_QUOTA_LEASE_LEASE_TTL_SECONDS:-600}
      - GATEWAY_QUOTA_LEASE_RECLAIM_GRACE_SECONDS=${GATEWAY_QUOTA_LEASE_RECLAIM_GRACE_SECONDS:-3600}
      - GATEWAY_QUOTA_LEASE_REMOTE_TIMEOUT_SECONDS=${GATEWAY_QUOTA_LEASE_REMOTE_TIMEOUT_SECONDS:-15}
      - GATEWAY_QUOTA_LEASE_PREFLIGHT_RESERVE_AMOUNT=${GATEWAY_QUOTA_LEASE_PREFLIGHT_RESERVE_AMOUNT:-0.000001}
      - GATEWAY_QUOTA_LEASE_PREFETCH_LOW_WATERMARK_AMOUNT=${GATEWAY_QUOTA_LEASE_PREFETCH_LOW_WATERMARK_AMOUNT:-0.2}
      - GATEWAY_QUOTA_LEASE_PREFETCH_AVERAGE_WINDOW=${GATEWAY_QUOTA_LEASE_PREFETCH_AVERAGE_WINDOW:-5}
      - GATEWAY_QUOTA_LEASE_PREFETCH_AVERAGE_MULTIPLIER=${GATEWAY_QUOTA_LEASE_PREFETCH_AVERAGE_MULTIPLIER:-3}
      - GATEWAY_QUOTA_LEASE_PREFETCH_DEBOUNCE_SECONDS=${GATEWAY_QUOTA_LEASE_PREFETCH_DEBOUNCE_SECONDS:-10}

      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
      - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_USER_AGENT_VERSION=${ANTIGRAVITY_USER_AGENT_VERSION:-}

      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-true}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-true}
      - SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS=${SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-}
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}

      - GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT=${GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT:-0}
      - GATEWAY_OPENAI_HTTP2_ENABLED=${GATEWAY_OPENAI_HTTP2_ENABLED:-true}
      - GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1=${GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1:-true}
      - GATEWAY_OPENAI_HTTP2_FALLBACK_ERROR_THRESHOLD=${GATEWAY_OPENAI_HTTP2_FALLBACK_ERROR_THRESHOLD:-2}
      - GATEWAY_OPENAI_HTTP2_FALLBACK_WINDOW_SECONDS=${GATEWAY_OPENAI_HTTP2_FALLBACK_WINDOW_SECONDS:-60}
      - GATEWAY_OPENAI_HTTP2_FALLBACK_TTL_SECONDS=${GATEWAY_OPENAI_HTTP2_FALLBACK_TTL_SECONDS:-600}
      - GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT=${GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT:-900}
      - GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL=${GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL:-10}
      - GATEWAY_IMAGE_CONCURRENCY_ENABLED=${GATEWAY_IMAGE_CONCURRENCY_ENABLED:-false}
      - GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS:-0}
      - GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE=${GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE:-reject}
      - GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS=${GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS:-30}
      - GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS:-100}
    depends_on:
      postgres-node:
        condition: service_healthy
      redis-node:
        condition: service_healthy
    networks:
      - sub2api-node-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres-node:
    image: postgres:18-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-sub2api-node-postgres}
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./node_postgres_data:/var/lib/postgresql/data:Z
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-node-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-node:
    image: redis:8-alpine
    container_name: ${REDIS_CONTAINER_NAME:-sub2api-node-redis}
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./node_redis_data:/data:Z
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - sub2api-node-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  sub2api-node-network:
    driver: bridge
