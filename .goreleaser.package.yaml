version: 2

project_name: sub2api

snapshot:
  version_template: "{{ if .Env.PACKAGE_VERSION }}{{ .Env.PACKAGE_VERSION }}{{ else }}snapshot{{ end }}"

builds:
  - id: sub2api
    dir: backend
    main: ./cmd/server
    binary: sub2api
    flags:
      - -tags=embed
      - -trimpath
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
      - -X main.BuildType=release

archives:
  - id: package
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README*
      - deploy/*

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true
