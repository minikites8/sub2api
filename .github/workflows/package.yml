name: Package

on:
  push:
    branches:
      - main
      - 'codex/**'
      - 'test/**'
      - 'testing/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare package metadata
        id: package_meta
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-manual}"
          safe_ref="$(echo "$ref_name" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          short_sha="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            channel="main"
            package_id="main-${short_sha}"
          else
            channel="test"
            package_id="test-${safe_ref:-manual}-${short_sha}"
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "package_id=${package_id}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ steps.package_meta.outputs.package_id }}
          path: backend/internal/web/dist/
          retention-days: 1

  package:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare package metadata
        id: package_meta
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-manual}"
          safe_ref="$(echo "$ref_name" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          short_sha="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            channel="main"
            package_id="main-${short_sha}"
          else
            channel="test"
            package_id="test-${safe_ref:-manual}-${short_sha}"
          fi
          {
            echo "channel=${channel}"
            echo "safe_ref=${safe_ref:-manual}"
            echo "package_id=${package_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ steps.package_meta.outputs.package_id }}
          path: backend/internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: |
          expected_version="go$(awk '$1 == "go" { print $2; exit }' backend/go.mod)"
          actual_version="$(go env GOVERSION)"
          echo "Expected Go version: ${expected_version}"
          echo "Actual Go version: ${actual_version}"
          test "${actual_version}" = "${expected_version}"

      - name: Set lowercase owner for GoReleaser templates
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Prepare Docker tags
        id: docker_meta
        shell: bash
        run: |
          if [ "${{ steps.package_meta.outputs.channel }}" = "main" ]; then
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ steps.lowercase.outputs.owner }}/sub2api:main"
              echo "ghcr.io/${{ steps.lowercase.outputs.owner }}/sub2api:main-${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ steps.lowercase.outputs.owner }}/sub2api:${{ steps.package_meta.outputs.package_id }}"
              echo "ghcr.io/${{ steps.lowercase.outputs.owner }}/sub2api:test-${{ steps.package_meta.outputs.safe_ref }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: ${{ github.event_name == 'push' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ github.event_name == 'push' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: build --snapshot --clean
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: skip
          TAG_MESSAGE: snapshot package build
          PACKAGE_VERSION: ${{ steps.package_meta.outputs.package_id }}

      - name: Build and push GHCR image
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.docker_meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.package_meta.outputs.package_id }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-dist-${{ steps.package_meta.outputs.package_id }}
          path: dist/**
          retention-days: 7
